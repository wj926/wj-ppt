<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>편집 · {{ title }}</title>
<link rel="stylesheet" href="{{ url_for('static', filename='editor.css') }}?v={{ asset_ver }}">
</head>
<body data-deck="{{ deck_id }}" data-user="{{ user or '' }}">
<header class="ebar">
  <div class="grp left">
    <a class="btn ghost sm" href="/">← 목록</a>
    <button class="btn ghost sm" id="railBtn" title="슬라이드 목차 열기/닫기">목차</button>
    <button class="btn ghost sm" id="presentBtn" title="발표 모드(전체화면)">발표</button>
    <span class="etitle" id="etitle">{{ title }}</span>
  </div>
  <div class="grp center">
    <button class="btn ghost sm" id="prevBtn" title="이전 페이지">◀</button>
    <span class="pageind" id="pageInd">– / –</span>
    <button class="btn ghost sm" id="nextBtn" title="다음 페이지">▶</button>
  </div>
  <div class="grp right">
    <button class="btn" id="modeBtn">편집 시작</button>
    <span class="editonly" id="editControls" hidden>
      <button class="btn ghost sm" id="undoBtn" title="되돌리기 (Ctrl+Z)" disabled>되돌리기</button>
      <button class="btn ghost sm" id="redoBtn" title="다시 실행 (Ctrl+Shift+Z)" disabled>다시</button>
      <span class="sep">글자</span>
      <button class="btn ghost sm" id="fontDown" title="선택한 글자 작게">A−</button>
      <button class="btn ghost sm" id="fontUp" title="선택한 글자 크게">A＋</button>
      <span class="sep">그림</span>
      <button class="btn ghost sm" id="imgDown" title="선택한 그림 작게">－</button>
      <button class="btn ghost sm" id="imgUp" title="선택한 그림 크게">＋</button>
      <button class="btn ghost sm" id="replaceImg" title="선택한 그림 교체">이미지 바꾸기</button>
      <button class="btn ghost sm" id="resetSel" title="선택 요소 원위치/원크기">원위치</button>
    </span>
    <span class="savestat" id="saveStatus"></span>
    <button class="btn" id="saveBtn">저장</button>
    <a class="btn ghost" id="dlBtn" href="/download/{{ deck_id }}">다운로드</a>
  </div>
</header>

<div class="stage-wrap">
  <aside class="rail" id="railPanel" hidden></aside>
  <iframe id="frame" src="/raw/{{ deck_id }}" title="슬라이드"></iframe>
  <div id="imgHandle" title="드래그해서 크기 조절" hidden></div>
  <button id="presentExit" hidden>발표 종료 (Esc)</button>
</div>

<div class="hintbar" id="hintbar">편집을 시작하려면 우측 상단 <b>편집 시작</b>을 누르세요.</div>
<div class="prop" id="propPanel" hidden></div>
<input type="file" id="imgPicker" accept="image/*" hidden>

<script>window.HRE = { deckId: "{{ deck_id }}", user: "{{ user or '' }}" };</script>
<script src="{{ url_for('static', filename='editor.js') }}?v={{ asset_ver }}"></script>
</body>
</html>
